name: Relevamiento de precios

# ⚠️ SIN `on: schedule` (7/7/26): el scheduler de GitHub Actions corría con +1h40
# a +3h52 de atraso todos los días (throttling en repos privados) y los precios
# llegaban a Midia a mediodía en vez de a las 9. Ahora lo dispara pg_cron de
# Supabase Midia (job "relevador-carnes-relevamiento", '0 12 * * *') vía
# https://cartera-app.vercel.app/api/cron/gh-dispatch?wf=relevamiento, que hace
# el workflow_dispatch por API de GitHub (arranca en segundos, sin throttle).
on:
  workflow_dispatch:        # disparado por pg_cron vía gh-dispatch, o a mano desde Actions

permissions:
  contents: write           # para poder commitear la DB actualizada

concurrency:
  group: relevamiento
  cancel-in-progress: false

jobs:
  relevar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Correr relevamiento
        env:
          # Notificaciones (configurar como GitHub Secrets en Settings > Secrets)
          WHATSAPP_NUMERO: ${{ secrets.WHATSAPP_NUMERO }}
          SMTP_HOST:       ${{ secrets.SMTP_HOST }}
          SMTP_PORT:       ${{ secrets.SMTP_PORT }}
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASS:       ${{ secrets.SMTP_PASS }}
          EMAIL_FROM:      ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
          EMAIL_TO_CC:     ${{ secrets.EMAIL_TO_CC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          # Snapshot en vivo para el panel de Carlos
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run.py --todos

      - name: Commitear DB y reportes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/precios.db data/latest.json || true
          git add reports/ || true
          if git diff --cached --quiet; then
            echo "Sin cambios para commitear."
          else
            git commit -m "chore: relevamiento $(date -u +%Y-%m-%d)"
            # Reintentamos hasta 3 veces con pull --rebase para resistir pushes paralelos
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "Push falló (intento $i), reintentando en 5s..."
              sleep 5
            done
          fi

      - name: Upload reportes como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reportes-${{ github.run_id }}
          path: |
            reports/*.md
            reports/*.xlsx
            reports/*.pdf
            reports/graficos_*/**
          if-no-files-found: ignore
          retention-days: 30
